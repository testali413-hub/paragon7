name: Universal Downloader to GDrive

on:
  workflow_dispatch:
    inputs:
      download_type:
        description: 'نوع دانلود (url یا file)'
        required: true
      download_source:
        description: 'لینک یا file_id'
        required: true
      chat_id:
        description: 'شناسه عددی چت'
        required: true
      cookies_base64:
        description: 'کوکی‌های base64 (اختیاری)'
        required: false
        default: ''

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp (without ffmpeg)
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: false

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup rclone (install only, no config)
        uses: AnimMouse/setup-rclone@v1

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CFG" > ~/.config/rclone/rclone.conf
        env:
          RCLONE_CFG: ${{ secrets.RCLONE_CONFIG }}

      - name: Download and Upload
        env:
          TYPE: ${{ github.event.inputs.download_type }}
          SOURCE: ${{ github.event.inputs.download_source }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          COOKIES_BASE64: ${{ github.event.inputs.cookies_base64 }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          #!/bin/bash

          # تابع ارسال پیام ساده
          send_message() {
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}" -d "text=$1" > /dev/null
          }

          # ساخت فایل کوکی در صورت وجود
          COOKIES_ARG=""
          if [ -n "$COOKIES_BASE64" ]; then
            echo "$COOKIES_BASE64" | base64 -d > cookies.txt
            COOKIES_ARG="--cookies cookies.txt"
          elif [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            COOKIES_ARG="--cookies cookies.txt"
          fi

          send_message "⏳ شروع دانلود..."

          if [ "$TYPE" = "url" ]; then
            # دانلود از لینک
            yt-dlp $COOKIES_ARG -o "%(title).200s.%(ext)s" --merge-output-format mkv --no-part "$SOURCE"
            FILENAME=$(ls -t | head -1)   # آخرین فایل ایجاد شده (برای اطمینان)
          elif [ "$TYPE" = "file" ]; then
            send_message "📥 دریافت فایل از تلگرام..."
            FILE_INFO=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${SOURCE}")
            FILE_PATH=$(echo "$FILE_INFO" | jq -r '.result.file_path')
            if [ "$FILE_PATH" = "null" ] || [ -z "$FILE_PATH" ]; then
              send_message "❌ خطا در دریافت فایل."
              exit 1
            fi
            FILENAME=$(basename "$FILE_PATH")
            curl -L -o "$FILENAME" "https://api.telegram.org/file/bot${BOT_TOKEN}/${FILE_PATH}"
          else
            send_message "❌ نوع نامعتبر."
            exit 1
          fi

          if [ ! -f "$FILENAME" ]; then
            send_message "❌ فایل دانلود نشد."
            exit 1
          fi

          send_message "☁️ آپلود روی گوگل درایو..."
          rclone mkdir "gdrive:TelegramDownloads"
          rclone copy "./$FILENAME" "gdrive:TelegramDownloads"
          DL_LINK=$(rclone link "gdrive:TelegramDownloads/$FILENAME")
          send_message "✅ آپلود شد!%0A%0A📎 $DL_LINK"
          rm -f "$FILENAME"
        
