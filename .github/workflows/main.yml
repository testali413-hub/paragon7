name: Universal Downloader to GDrive

on:
  workflow_dispatch:
    inputs:
      download_type:
        description: 'نوع دانلود (url یا file)'
        required: true
      download_source:
        description: 'لینک یا file_id تلگرام'
        required: true
      chat_id:
        description: 'شناسه عددی چت تلگرام'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Write cookies file
        run: echo "$YOUTUBE_COOKIES" > /home/runner/cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Run main process
        env:
          TYPE: ${{ github.event.inputs.download_type }}
          SOURCE: ${{ github.event.inputs.download_source }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          #!/bin/bash
          set -e

          send_message() {
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="$1"
          }

          send_message "⏳ پردازش شروع شد..."

          if [ "$TYPE" = "url" ]; then
            send_message "⬇️ در حال دانلود لینک..."
            FILENAME=$(yt-dlp --cookies /home/runner/cookies.txt --print filename -o "%(title).200s.%(ext)s" "$SOURCE")
            yt-dlp --cookies /home/runner/cookies.txt -o "$FILENAME" "$SOURCE"
          elif [ "$TYPE" = "file" ]; then
            send_message "📎 دریافت اطلاعات فایل تلگرام..."
            FILE_INFO=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${SOURCE}")
            FILE_PATH=$(echo "$FILE_INFO" | jq -r '.result.file_path')
            if [ "$FILE_PATH" = "null" ] || [ -z "$FILE_PATH" ]; then
              send_message "❌ خطا در دریافت فایل."
              exit 1
            fi
            FILENAME=$(basename "$FILE_PATH")
            send_message "📥 دانلود فایل ${FILENAME} از سرور تلگرام..."
            curl -L -o "$FILENAME" "https://api.telegram.org/file/bot${BOT_TOKEN}/${FILE_PATH}"
          else
            send_message "❌ نوع نامعتبر."
            exit 1
          fi

          send_message "☁️ آپلود روی گوگل درایو..."
          rclone mkdir "gdrive:TelegramDownloads"
          rclone copy "./$FILENAME" "gdrive:TelegramDownloads" --progress
          DL_LINK=$(rclone link "gdrive:TelegramDownloads/$FILENAME")
          send_message "✅ آپلود شد!%0A%0A📎 $DL_LINK"
          rm -f "$FILENAME"
